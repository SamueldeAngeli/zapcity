<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Zap City RP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./app.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">ZC</span>
      <div>
        <strong>Zap City RP</strong>
        <small>Painel HTML</small>
      </div>
    </div>

    <div class="status-pill" id="connectionStatus">Aguardando conexão</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <button class="nav-item is-active" type="button" data-panel-tab="messages">Mensagens</button>
      <button class="nav-item" type="button" data-panel-tab="status">Status</button>
      <button class="nav-item" type="button" data-panel-tab="settings">Configuração</button>
    </aside>

    <section class="workspace">
      <section class="panel-view is-active" id="messagesView">
        <div class="section-heading">
          <div>
            <span class="eyebrow">Envio pelo Discord</span>
            <h1>Mensagem por bot e aba</h1>
          </div>
          <button class="button secondary" type="button" id="reloadOptionsButton">Recarregar abas</button>
        </div>

        <form class="compose-grid" id="messageForm">
          <section class="card">
            <h2>Destino</h2>
            <label>
              <span>Bot</span>
              <select id="botSelect" name="botId" required></select>
            </label>
            <label>
              <span>Aba / canal</span>
              <select id="tabSelect" name="tabId" required></select>
            </label>
            <label>
              <span>Formato</span>
              <select id="modeSelect" name="mode">
                <option value="simple">Mensagem simples</option>
                <option value="embed">Embed profissional</option>
              </select>
            </label>
            <label>
              <span>Cor do embed</span>
              <select id="colorSelect" name="color">
                <option value="orange">Laranja</option>
                <option value="blue">Azul neon</option>
                <option value="green">Verde</option>
                <option value="yellow">Amarelo</option>
                <option value="red">Vermelho</option>
                <option value="neutral">Neutro</option>
              </select>
            </label>
          </section>

          <section class="card">
            <h2>Conteúdo</h2>
            <label>
              <span>Título do embed</span>
              <input id="titleInput" name="title" type="text" maxlength="180" placeholder="Opcional para mensagem simples">
            </label>
            <label>
              <span>Mensagem</span>
              <textarea id="messageInput" name="message" rows="10" maxlength="1800" required placeholder="Escreva a mensagem que será enviada no canal escolhido"></textarea>
            </label>
            <div class="form-actions">
              <button class="button" type="submit">Enviar mensagem</button>
              <button class="button ghost" type="button" id="clearButton">Limpar</button>
            </div>
          </section>
        </form>

        <section class="card log-card">
          <h2>Retorno</h2>
          <pre id="responseLog">Pronto para enviar.</pre>
        </section>
      </section>

      <section class="panel-view" id="statusView">
        <div class="section-heading">
          <div>
            <span class="eyebrow">Monitoramento</span>
            <h1>Status do sistema</h1>
          </div>
          <button class="button secondary" type="button" id="healthButton">Atualizar</button>
        </div>

        <div class="metric-grid">
          <article class="metric-card">
            <span>API</span>
            <strong id="apiMetric">-</strong>
          </article>
          <article class="metric-card">
            <span>Banco</span>
            <strong id="databaseMetric">-</strong>
          </article>
          <article class="metric-card">
            <span>Bot Discord</span>
            <strong id="botMetric">-</strong>
          </article>
        </div>
      </section>

      <section class="panel-view" id="settingsView">
        <div class="section-heading">
          <div>
            <span class="eyebrow">Configuração local</span>
            <h1>Conectar painel à API</h1>
          </div>
        </div>

        <form class="card settings-card" id="settingsForm">
          <label>
            <span>URL da API</span>
            <input id="apiBaseInput" type="url" placeholder="http://127.0.0.1:3000">
          </label>
          <div class="field-row">
            <label>
              <span>Usuário admin</span>
              <input id="adminUserInput" type="text" autocomplete="username">
            </label>
            <label>
              <span>Senha admin</span>
              <input id="adminPasswordInput" type="password" autocomplete="current-password">
            </label>
          </div>
          <div class="form-actions">
            <button class="button" type="submit">Salvar e conectar</button>
            <button class="button ghost" type="button" id="forgetButton">Esquecer dados</button>
          </div>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
